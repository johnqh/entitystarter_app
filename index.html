<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Do it</title>
    <meta name="description" content="Do it by Sudobility Inc" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Do it" />
    <meta property="og:title" content="Do it" />
    <meta property="og:description" content="Do it by Sudobility Inc" />
    <!-- No og:url / canonical / hreflang here: those are PAGE-SPECIFIC, but this
         shell is shared by every route. They are supplied per-route by
         generate-seo-assets (build) and by functions/_middleware.js
         (request-time snapshot injection). -->
    <meta property="og:image" content="https://doit.com/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Do it" />
    <meta name="twitter:description" content="Do it by Sudobility Inc" />
    <meta name="twitter:image" content="https://doit.com/og-image.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  </head>

    <div id="root"></div>

</html>
